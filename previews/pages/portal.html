<!DOCTYPE html>
<html lang="en" class="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>My Account — ArrayPress</title>
<meta name="robots" content="noindex,nofollow">
<style>:root{--brand:#06b6d4}
/* ── Reset ──────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}

/* ── Light Theme (default) ──────────────── */
:root{
  --bg:#f8f9fa;
  --bg-page:#ffffff;
  --bg-card:#ffffff;
  --bg-input:#f1f3f5;
  --bg-code:#f1f3f5;
  --bg-hover:rgba(0,0,0,0.02);
  --text:#18181b;
  --text-secondary:#3f3f46;
  --text-muted:#71717a;
  --text-faint:#a1a1aa;
  --border:rgba(0,0,0,0.08);
  --border-light:rgba(0,0,0,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.06);
  --radius:12px;
  --radius-sm:8px;
  --radius-xs:6px;
}

/* ── Dark Theme ─────────────────────────── */
.dark{
  --bg:#121212;
  --bg-page:#121212;
  --bg-card:#1a1a1e;
  --bg-input:#222226;
  --bg-code:#222226;
  --bg-hover:rgba(255,255,255,0.04);
  --text:#f0f0f0;
  --text-secondary:#c8c8cc;
  --text-muted:#8a8a8f;
  --text-faint:#5a5a60;
  --border:rgba(255,255,255,0.08);
  --border-light:rgba(255,255,255,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.4);
}

/* ── Auto Theme (follows OS) ────────────── */
@media(prefers-color-scheme:dark){
  .auto{
    --bg:#121212;
    --bg-page:#121212;
    --bg-card:#1a1a1e;
    --bg-input:#222226;
    --bg-code:#222226;
    --bg-hover:rgba(255,255,255,0.04);
    --text:#f0f0f0;
    --text-secondary:#c8c8cc;
    --text-muted:#8a8a8f;
    --text-faint:#5a5a60;
    --border:rgba(255,255,255,0.08);
    --border-light:rgba(255,255,255,0.04);
    --shadow:0 1px 3px rgba(0,0,0,0.4);
  }
}

/* ── Animations ─────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Base ───────────────────────────────── */
html,body{min-height:100%;margin:0}
html{background:#f8f9fa}
html.dark{background:#121212}
@media(prefers-color-scheme:dark){html.auto{background:#121212}}
@media(prefers-color-scheme:light){html.auto{background:#f8f9fa}}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;padding:24px;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--brand);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Layout ─────────────────────────────── */
.container{max-width:540px;width:100%;animation:fadeIn 0.3s ease}

/* ── Header ─────────────────────────────── */
.page-header{text-align:center;margin-bottom:32px}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text)}
.page-header .subtitle{font-size:14px;color:var(--text-muted);line-height:1.5}

/* ── Icon Circle ────────────────────────── */
.icon-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.icon-circle svg{width:28px;height:28px}

/* ── Cards ──────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}

/* ── Buttons ────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 20px;background:var(--brand);color:#000;
  border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity 0.15s;text-decoration:none;font-family:inherit;
}
.btn:hover{opacity:0.85;text-decoration:none}
.btn:disabled,.btn-disabled{opacity:0.35;cursor:not-allowed;pointer-events:none}
.btn-outline{background:transparent;color:var(--brand);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg-hover)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:var(--radius-xs)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444}

/* ── Inputs ─────────────────────────────── */
.input{
  width:100%;padding:12px 16px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;outline:none;transition:border-color 0.15s;font-family:inherit;
}
.input:focus{border-color:color-mix(in srgb,var(--brand) 40%,transparent)}
.input::placeholder{color:var(--text-faint)}

/* ── File Rows ──────────────────────────── */
.file-row{
  display:flex;align-items:center;gap:16px;padding:16px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;transition:opacity 0.15s;
}
.file-row-exhausted{opacity:0.5}
.file-icon{
  flex-shrink:0;width:40px;height:40px;border-radius:var(--radius-sm);
  background:color-mix(in srgb,var(--brand) 10%,transparent);
  display:flex;align-items:center;justify-content:center;
}
.file-icon-exhausted{background:rgba(239,68,68,0.1)}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.download-count{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);margin-top:4px}
.download-count-warn{color:#f59e0b}
.download-count-exhausted{color:#ef4444}

/* ── License Keys ───────────────────────── */
.license-row{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;
}
.license-key{
  font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  font-size:13px;font-weight:600;background:var(--bg-code);
  padding:6px 12px;border-radius:var(--radius-xs);
  border:1px solid var(--border);user-select:all;flex:1;color:var(--text);
}
.license-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.license-active{background:color-mix(in srgb,var(--brand) 10%,transparent);color:var(--brand)}
.license-expired{background:rgba(239,68,68,0.1);color:#ef4444}

/* ── Order Cards ────────────────────────── */
.order-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);
}
.order-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid var(--border-light);
}
.order-amount{font-size:16px;font-weight:700;font-family:ui-monospace,monospace;color:var(--text)}
.order-date{font-size:12px;color:var(--text-muted)}
.order-body{padding:16px 20px}

/* ── Key-Value ──────────────────────────── */
.kv-list{margin:16px 0}
.kv-row{
  display:flex;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid var(--border-light);font-size:14px;
}
.kv-label{color:var(--text-muted)}
.kv-value{color:var(--text);font-weight:500}

/* ── Alerts ─────────────────────────────── */
.alert{padding:14px 16px;border-radius:var(--radius-sm);margin:16px 0;font-size:14px;line-height:1.6}
.alert-info{background:#eff6ff;border-left:4px solid #3b82f6;color:#1e40af}
.alert-success{background:#f0fdf4;border-left:4px solid #10b981;color:#065f46}
.alert-warning{background:#fffbeb;border-left:4px solid #f59e0b;color:#92400e}
.alert-error{background:#fef2f2;border-left:4px solid #ef4444;color:#991b1b}
.dark .alert-info{background:rgba(59,130,246,0.1);color:#93c5fd}
.dark .alert-success{background:rgba(16,185,129,0.1);color:#6ee7b7}
.dark .alert-warning{background:rgba(245,158,11,0.1);color:#fcd34d}
.dark .alert-error{background:rgba(239,68,68,0.1);color:#fca5a5}
.auto .alert-info{background:#eff6ff;color:#1e40af}
.auto .alert-success{background:#f0fdf4;color:#065f46}
.auto .alert-warning{background:#fffbeb;color:#92400e}
.auto .alert-error{background:#fef2f2;color:#991b1b}
@media(prefers-color-scheme:dark){
  .auto .alert-info{background:rgba(59,130,246,0.1);color:#93c5fd}
  .auto .alert-success{background:rgba(16,185,129,0.1);color:#6ee7b7}
  .auto .alert-warning{background:rgba(245,158,11,0.1);color:#fcd34d}
  .auto .alert-error{background:rgba(239,68,68,0.1);color:#fca5a5}
}

/* ── Tabs ───────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-muted);
  cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;
  background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;
}
.tab:hover{color:var(--text)}
.tab-active{color:var(--brand);border-bottom-color:var(--brand)}
.tab-panel{display:none}
.tab-panel-active{display:block}

/* ── Section Labels ─────────────────────── */
.section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--text-faint);margin-bottom:12px;
}

/* ── Note/Empty ─────────────────────────── */
.note{
  text-align:center;padding:24px 16px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:10px;
  font-size:13px;color:var(--text-muted);
}

/* ── Spinner ────────────────────────────── */
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--brand);border-radius:50%;
  margin:0 auto 16px;animation:spin 0.8s linear infinite;
}

/* ── Footer ─────────────────────────────── */
.page-footer{text-align:center;margin-top:32px;font-size:12px;color:var(--text-faint)}

/* ── Copy Button ────────────────────────── */
.copy-btn{
  padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;
  background:var(--bg-hover);border:1px solid var(--border);border-radius:4px;
  color:var(--text-muted);transition:all 0.15s;font-family:inherit;
}
.copy-btn:hover{color:var(--text);background:var(--bg-input)}

/* ── Responsive ─────────────────────────── */
@media(max-width:580px){
  body{padding:16px}
  .container{max-width:100%}
  .page-header h1{font-size:20px}
  .order-header{flex-direction:column;align-items:flex-start;gap:4px}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>

</head>
<body>
<div class="container">
<div class="page-header"><div class="icon-circle" style="background:color-mix(in srgb, var(--brand) 12%, transparent)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><h1>David Sherlock</h1><p class="subtitle">david@example.com</p></div><div style="text-align:center;margin-bottom:24px"><a href="#manage-billing" class="btn btn-outline">Manage Billing</a></div><div class="tabs"><button class="tab tab-active" data-tab="orders" onclick="switchTab('orders')">Orders</button><button class="tab " data-tab="downloads" onclick="switchTab('downloads')">Downloads</button><button class="tab " data-tab="licenses" onclick="switchTab('licenses')">Licenses</button></div><div class="tab-panel tab-panel-active" data-panel="orders"><div style="text-align:center;padding:24px 0;"><div class="spinner"></div><div style="font-size:13px;color:var(--text-muted)">Loading orders...</div></div></div><div class="tab-panel " data-panel="downloads"><div style="text-align:center;padding:24px 0;"><div class="spinner"></div><div style="font-size:13px;color:var(--text-muted)">Loading downloads...</div></div></div><div class="tab-panel " data-panel="licenses"><div style="text-align:center;padding:24px 0;"><div class="spinner"></div><div style="font-size:13px;color:var(--text-muted)">Loading licenses...</div></div></div><div style="height:16px"></div><div style="text-align:center"><a href="/store/logout" class="btn btn-outline">Sign Out</a></div>
<div class="page-footer"><p>&copy; 2026 ArrayPress</p></div>
</div>
<script>

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('tab-active',t.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('tab-panel-active',p.dataset.panel===id));
}

var API='/api/store';
var TOKEN='preview-token';
function api(path){return fetch(API+path,{headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json())}
function el(id){return document.querySelector('[data-panel="'+id+'"]')}

api('/account/orders').then(function(d){
  var h='';
  if(d.orders&&d.orders.length){
    d.orders.forEach(function(o){
      h+='<div class="order-card"><div class="order-header"><div>';
      h+='<div style="font-size:14px;font-weight:600;color:var(--text)">'+(o.order_number||o.id)+'</div>';
      h+='<div class="order-date">'+(o.created_at||'')+'</div>';
      h+='</div><div class="order-amount">'+(o.amount_formatted||'')+'</div></div></div>';
    });
  }else{h='<div class="note">No orders yet.</div>';}
  el('orders').innerHTML=h;
});

api('/account/downloads').then(function(d){
  var h='';
  if(d.files&&d.files.length){
    d.files.forEach(function(f){
      h+='<div class="file-row"><div class="file-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>';
      h+='<div class="file-info"><div class="file-name">'+f.name+'</div>';
      h+='<div class="file-meta">'+(f.size||'')+'</div></div>';
      h+='<a href="'+f.url+'" class="btn btn-sm">Download</a></div>';
    });
  }else{h='<div class="note">No downloads available.</div>';}
  el('downloads').innerHTML=h;
});

api('/account/licenses').then(function(d){
  var h='';
  if(d.licenses&&d.licenses.length){
    d.licenses.forEach(function(l){
      var cls=l.status==='expired'?'license-expired':'license-active';
      var label=l.status==='expired'?'Expired':'Active';
      h+='<div class="license-row">';
      h+='<div class="license-key">'+l.license_key+'</div>';
      h+='<button class="copy-btn" onclick="navigator.clipboard.writeText(\''+l.license_key+'\');this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'Copy\',1500)">Copy</button>';
      h+='<span class="license-status '+cls+'">'+label+'</span></div>';
    });
  }else{h='<div class="note">No license keys.</div>';}
  el('licenses').innerHTML=h;
});
</script>
</body>
</html>
